<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>羊羊语音助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 24px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .status {
            background: #f0f0f0;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: center;
            color: #666;
            font-size: 14px;
        }
        .status.listening { background: #e8f5e9; color: #2e7d32; }
        .status.speaking { background: #e3f2fd; color: #1976d2; }
        .status.error { background: #ffebee; color: #c62828; }
        .record-btn {
            width: 100%;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-bottom: 20px;
        }
        .record-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        .record-btn:active { transform: translateY(0); }
        .record-btn.recording {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        .result {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            min-height: 80px;
            margin-bottom: 20px;
            display: none;
        }
        .result h3 {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
        }
        .result-text {
            font-size: 16px;
            color: #333;
            line-height: 1.5;
        }
        .play-btn {
            width: 100%;
            padding: 15px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            display: none;
        }
        .play-btn:hover { background: #218838; }
        .footer {
            text-align: center;
            margin-top: 20px;
            color: #999;
            font-size: 12px;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐑 羊羊语音助手</h1>
        <p class="subtitle">按住说话，松开发送</p>
        
        <div class="status" id="status">点击按钮开始说话</div>
        
        <button class="record-btn" id="recordBtn">
            🎤 按住说话
        </button>
        
        <div class="result" id="result">
            <h3>识别结果：</h3>
            <div class="result-text" id="resultText"></div>
        </div>
        
        <button class="play-btn" id="playBtn">
            🔊 播放回复
        </button>
        
        <div class="footer">
            Powered by OpenClaw | 羊羊制作
        </div>
    </div>

    <script>
        const recordBtn = document.getElementById('recordBtn');
        const playBtn = document.getElementById('playBtn');
        const status = document.getElementById('status');
        const result = document.getElementById('result');
        const resultText = document.getElementById('resultText');
        
        let mediaRecorder;
        let audioChunks = [];
        let isRecording = false;
        let currentAudioUrl = null;
        
        // API 配置 - 需要替换成实际的 API 端点
        const API_BASE_URL = 'http://localhost:19000'; // OpenClaw Gateway 地址
        
        // 检查浏览器支持
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            status.textContent = '❌ 您的浏览器不支持录音功能';
            status.className = 'status error';
            recordBtn.disabled = true;
        }
        
        recordBtn.addEventListener('mousedown', startRecording);
        recordBtn.addEventListener('mouseup', stopRecording);
        recordBtn.addEventListener('mouseleave', stopRecording);
        
        // 移动端触摸支持
        recordBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            startRecording();
        });
        recordBtn.addEventListener('touchend', (e) => {
            e.preventDefault();
            stopRecording();
        });
        
        async function startRecording() {
            if (isRecording) return;
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                
                mediaRecorder.ondataavailable = (event) => {
                    audioChunks.push(event.data);
                };
                
                mediaRecorder.onstop = processAudio;
                
                mediaRecorder.start();
                isRecording = true;
                
                recordBtn.textContent = '🔴 录音中... 松开结束';
                recordBtn.classList.add('recording');
                status.textContent = '正在录音...';
                status.className = 'status listening';
                result.style.display = 'none';
                playBtn.style.display = 'none';
                
            } catch (err) {
                status.textContent = '❌ 无法访问麦克风：' + err.message;
                status.className = 'status error';
            }
        }
        
        function stopRecording() {
            if (!isRecording || !mediaRecorder) return;
            
            mediaRecorder.stop();
            mediaRecorder.stream.getTracks().forEach(track => track.stop());
            isRecording = false;
            
            recordBtn.textContent = '🎤 按住说话';
            recordBtn.classList.remove('recording');
            status.textContent = '正在处理...';
            status.className = 'status';
        }
        
        async function processAudio() {
            const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
            
            status.innerHTML = '<span class="loading"></span> 正在识别语音...';
            
            try {
                // 调用后端 API 处理语音
                const formData = new FormData();
                formData.append('audio', audioBlob, 'recording.webm');
                
                // 发送到 OpenClaw Gateway
                const response = await fetch(`${API_BASE_URL}/agent/voice`, {
                    method: 'POST',
                    body: formData
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                
                // 显示识别结果
                resultText.textContent = data.text || '识别成功';
                result.style.display = 'block';
                status.textContent = '✅ 识别成功';
                status.className = 'status';
                
                // 如果有音频回复
                if (data.audio_url) {
                    currentAudioUrl = data.audio_url;
                    playBtn.style.display = 'block';
                    playBtn.textContent = '🔊 播放回复';
                    playBtn.onclick = playReply;
                }
                
            } catch (err) {
                console.error('Error:', err);
                
                // 模拟响应（用于测试）
                const mockResponse = {
                    text: '阳阳你好！我是羊羊，我已经收到你的语音消息啦！现在我还在测试阶段，等后端 API 配置好后就能真正对话了！',
                    audio_url: null
                };
                
                resultText.textContent = mockResponse.text;
                result.style.display = 'block';
                status.textContent = '⚠️ 演示模式 - 后端 API 未连接';
                status.className = 'status';
            }
        }
        
        function playReply() {
            if (!currentAudioUrl) return;
            
            const audio = new Audio(currentAudioUrl);
            audio.play();
            
            status.textContent = '🔊 正在播放回复...';
            status.className = 'status speaking';
            playBtn.disabled = true;
            
            audio.onended = () => {
                status.textContent = '点击按钮继续说话';
                status.className = 'status';
                playBtn.disabled = false;
            };
            
            audio.onerror = () => {
                status.textContent = '❌ 播放失败';
                status.className = 'status error';
                playBtn.disabled = false;
            };
        }
        
        // 页面可见性变化时清理
        document.addEventListener('visibilitychange', () => {
            if (document.hidden && isRecording) {
                stopRecording();
            }
        });
    </script>
</body>
</html>
